<!-- ===== NEMA NAVBAR ===== -->
<nav class="navbar navbar-expand-lg nema-navbar" [class.rtl]="langService.isRTL()">
  <div class="container">

    <!-- Logo -->
    <a class="navbar-brand nema-brand" routerLink="/home">
      <img src="images/nema.png" alt="NEMA logo" class="nema-logo"/>
    </a>

    <!-- Mobile toggler -->
    <button class="navbar-toggler nema-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#nemaNavbar"
            aria-controls="nemaNavbar"
            aria-expanded="false"
            aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Collapsible content -->
    <div class="collapse navbar-collapse" id="nemaNavbar">

      <!-- Nav links -->
      <ul class="navbar-nav mx-auto gap-1">
        <li class="nav-item">
          <a class="nav-link nema-nav-link"
             routerLink="/home"
             routerLinkActive="nema-active"
             [routerLinkActiveOptions]="{ exact: false }">
            {{ langService.t().nav.home }}
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nema-nav-link"
             routerLink="/ourservices"
             routerLinkActive="nema-active">
            {{ langService.t().nav.services }}
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nema-nav-link"
             routerLink="/about"
             routerLinkActive="nema-active">
            {{ langService.t().nav.about }}
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nema-nav-link"
             routerLink="/getintouch"
             routerLinkActive="nema-active">
            {{ langService.t().nav.contact }}
          </a>
        </li>
      </ul>

      <!-- Language switcher -->
      <div class="lang-switcher">
        @for (lang of languages; track lang) {
          <button
            class="lang-btn"
            [class.lang-active]="langService.currentLang() === lang"
            (click)="setLanguage(lang)">
            {{ lang }}
          </button>
        }
      </div>

    </div>
  </div>
</nav>

<!-- ===== PAGE CONTENT ===== -->
<main class="nema-main">
  <router-outlet></router-outlet>
</main>

<!-- ===== LEGAL MODALS (Privacy Policy / Terms of Service) ===== -->
<app-legal-modal></app-legal-modal>
