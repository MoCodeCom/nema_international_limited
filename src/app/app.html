<!-- ===== GLOBAL BACKGROUND SLIDESHOW ===== -->
<!-- Fixed behind every page — cycles forever regardless of route -->
@for (img of slideshow.images; track img; let i = $index) {
  <div
    class="global-slide"
    [class.global-slide--active]="i === slideshow.activeIndex()"
    [style.background-image]="'url(' + img + ')'"
  ></div>
}
